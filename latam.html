<div id="nt-root">
  <div class="nt-header">
    <div class="nt-header-left">
      <div class="nt-icon">🌎</div>
      <div>
        <h1 class="nt-title">LatAm News Tracker</h1>
        <p class="nt-subtitle">Top newspapers + international coverage from 18 Latin American nations</p>
      </div>
    </div>
    <button class="nt-fetch-btn" id="nt-fetch">↻ Fetch Headlines</button>
  </div>
  <div class="nt-date" id="nt-date"></div>
  <div class="nt-status" id="nt-status">Loading latest headlines…</div>
  <div id="nt-countries"></div>
</div>

<style>
  #nt-root {
    --bg: #11151a;
    --panel: #171c23;
    --line: #2a313b;
    --text: #e7ecf1;
    --muted: #8b97a5;
    --accent: #f7f5d7;
    --accent-dim: #4a4a30;
    --blue: #5ab0ff;
    --blue-dim: #1c2f42;
    --green: #5fd99a;
    --red: #ff6b6b;
    font-family: 'Söhne', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    color: var(--text);
    background: var(--bg);
    border-radius: 12px;
    padding: 24px;
    box-sizing: border-box;
    min-height: 600px;
  }
  #nt-root * { box-sizing: border-box; }
  .nt-mono { font-family: 'JetBrains Mono', 'SF Mono', Consolas, monospace; }

  .nt-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 16px;
    flex-wrap: wrap;
    margin-bottom: 6px;
  }
  .nt-header-left { display: flex; align-items: flex-start; gap: 14px; }
  .nt-icon {
    width: 44px; height: 44px;
    border-radius: 10px;
    background: var(--accent-dim);
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }
  .nt-title { font-size: 22px; font-weight: 700; letter-spacing: -0.01em; margin: 0 0 4px 0; }
  .nt-subtitle { font-size: 13px; color: var(--muted); margin: 0; }
  .nt-fetch-btn {
    background: var(--accent);
    color: #1a1305;
    border: none;
    border-radius: 8px;
    padding: 10px 16px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
  }
  .nt-fetch-btn:hover { opacity: 0.9; }
  .nt-fetch-btn:disabled { opacity: 0.5; cursor: default; }

  .nt-date {
    font-size: 12.5px;
    color: var(--muted);
    margin: 10px 0 18px 0;
    display: flex; align-items: center; gap: 6px;
  }
  .nt-status {
    font-size: 12.5px;
    color: var(--muted);
    margin-bottom: 20px;
  }
  .nt-status.nt-error { color: var(--red); }
  .nt-status.nt-ok { color: var(--green); }

  .nt-country-block { margin-bottom: 34px; }
  .nt-country-header {
    display: flex; align-items: baseline; gap: 10px;
    margin-bottom: 8px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--line);
  }
  .nt-country-flag { font-size: 20px; }
  .nt-country-name { font-size: 18px; font-weight: 700; }
  .nt-country-summary {
    font-size: 13px;
    line-height: 1.6;
    color: var(--muted);
    font-style: italic;
    margin: 8px 0 16px 0;
  }

  .nt-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
    gap: 14px;
  }
  .nt-card {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 10px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  .nt-card-header {
    padding: 10px 14px;
    font-size: 12.5px;
    font-weight: 700;
    letter-spacing: 0.02em;
    background: var(--accent-dim);
    color: var(--accent);
  }
  .nt-card.nt-intl .nt-card-header {
    background: var(--blue-dim);
    color: var(--blue);
  }
  .nt-card-body { padding: 6px 14px 10px 14px; flex: 1; }
  .nt-story { padding: 10px 0; border-bottom: 1px solid var(--line); }
  .nt-story:last-child { border-bottom: none; }
  .nt-story a {
    color: var(--text);
    text-decoration: none;
    font-size: 13.5px;
    font-weight: 600;
    line-height: 1.4;
  }
  .nt-story a:hover { color: var(--accent); }
  .nt-story-desc {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.5;
    margin: 4px 0;
  }
  .nt-story-time {
    font-size: 11px;
    color: var(--muted);
  }
  .nt-story-source {
    font-size: 11px;
    color: var(--blue);
    font-weight: 600;
    margin-right: 6px;
  }
  .nt-empty {
    font-size: 12px;
    color: var(--muted);
    padding: 10px 0;
  }
</style>

<script>
(function () {
  const JSON_URL = 'https://raw.githubusercontent.com/jgonzalez-sudo/news-data1/main/latam_headlines.json';

  const COUNTRIES = [
    ['Argentina', '🇦🇷'], ['Brazil', '🇧🇷'], ['Mexico', '🇲🇽'], ['Colombia', '🇨🇴'],
    ['Chile', '🇨🇱'], ['Peru', '🇵🇪'], ['Venezuela', '🇻🇪'], ['Ecuador', '🇪🇨'],
    ['Bolivia', '🇧🇴'], ['Uruguay', '🇺🇾'], ['Paraguay', '🇵🇾'], ['Costa Rica', '🇨🇷'],
    ['Panama', '🇵🇦'], ['Guatemala', '🇬🇹'], ['Honduras', '🇭🇳'], ['El Salvador', '🇸🇻'],
    ['Dominican Republic', '🇩🇴'], ['Nicaragua', '🇳🇮']
  ];

  const root = document.getElementById('nt-countries');
  const statusEl = document.getElementById('nt-status');
  const dateEl = document.getElementById('nt-date');
  const fetchBtn = document.getElementById('nt-fetch');

  dateEl.innerHTML = '📅 ' + new Date().toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
  }

  function renderStory(story, sourceLabel) {
    const src = sourceLabel ? `<span class="nt-story-source">${escapeHtml(sourceLabel)}</span>` : '';
    return `
      <div class="nt-story">
        <a href="${escapeHtml(story.url || '#')}" target="_blank" rel="noopener">${escapeHtml(story.title || 'Untitled')}</a>
        ${story.description ? `<div class="nt-story-desc">${escapeHtml(story.description)}</div>` : ''}
        <div class="nt-story-time">${src}${escapeHtml(story.time || '')}</div>
      </div>`;
  }

  function render(data) {
    root.innerHTML = '';
    const headlines = data.headlines || {};
    const summaries = data.summaries || {};
    const international = data.international || {};

    COUNTRIES.forEach(([country, flag]) => {
      const paperKeys = Object.keys(headlines).filter(k => k.startsWith(country + '-'));
      const hasAny = paperKeys.some(k => (headlines[k] || []).length > 0) || (international[country] || []).length > 0;
      if (!hasAny) return;

      const block = document.createElement('div');
      block.className = 'nt-country-block';

      let html = `
        <div class="nt-country-header">
          <span class="nt-country-flag">${flag}</span>
          <span class="nt-country-name">${escapeHtml(country)}</span>
        </div>`;

      if (summaries[country]) {
        html += `<div class="nt-country-summary">${escapeHtml(summaries[country])}</div>`;
      }

      html += '<div class="nt-grid">';

      paperKeys.forEach(key => {
        const paperName = key.slice(country.length + 1);
        const stories = headlines[key] || [];
        html += `<div class="nt-card"><div class="nt-card-header">${escapeHtml(paperName)}</div><div class="nt-card-body">`;
        html += stories.length
          ? stories.map(s => renderStory(s)).join('')
          : '<div class="nt-empty">No recent stories.</div>';
        html += '</div></div>';
      });

      const intlStories = international[country] || [];
      html += `<div class="nt-card nt-intl"><div class="nt-card-header">Coverage from International Outlets · Last 24h</div><div class="nt-card-body">`;
      html += intlStories.length
        ? intlStories.map(s => renderStory(s, s.source)).join('')
        : '<div class="nt-empty">No international coverage found.</div>';
      html += '</div></div>';

      html += '</div>';
      block.innerHTML = html;
      root.appendChild(block);
    });

    if (!root.children.length) {
      root.innerHTML = '<div class="nt-empty">No stories available right now — try Fetch Headlines.</div>';
    }
  }

  async function load() {
    statusEl.textContent = 'Loading latest headlines…';
    statusEl.className = 'nt-status';
    fetchBtn.disabled = true;
    try {
      const res = await fetch(JSON_URL + '?t=' + Date.now());
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      render(data);
      statusEl.textContent = 'Headlines loaded.';
      statusEl.className = 'nt-status nt-ok';
    } catch (err) {
      statusEl.textContent = 'Could not load headlines (' + err.message + '). Check the GitHub JSON is published.';
      statusEl.className = 'nt-status nt-error';
    } finally {
      fetchBtn.disabled = false;
    }
  }

  fetchBtn.addEventListener('click', load);
  load();
})();
</script>
