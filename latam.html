<body>
<div id="nt-root">
  <div class="nt-masthead">
    <div class="nt-masthead-top">
      <span class="nt-eyebrow">Semafor</span>
      <span class="nt-eyebrow" id="nt-date"></span>
    </div>
    <h1 class="nt-title">LatAm</h1>
    <div class="nt-rule"></div>
    <div class="nt-masthead-bottom">
      <p class="nt-subtitle" id="nt-status">Loading latest headlines…</p>
      <button class="nt-fetch-btn" id="nt-fetch">Refresh</button>
    </div>
  </div>

  <div class="nt-exec" id="nt-exec" style="display:none;">
    <div class="nt-section-label">In today's edition</div>
    <ol id="nt-exec-list"></ol>
  </div>

  <div class="nt-suggestions" id="nt-suggestions" style="display:none;">
    <div class="nt-suggest-header">
      <div class="nt-section-label">Suggested for today's newsletter</div>
      <button class="nt-slack-btn" id="nt-slack-btn">Send to Slack</button>
    </div>
    <div id="nt-suggest-body"></div>
  </div>

  <div id="nt-regions"></div>

  <div class="nt-quiet-line" id="nt-quiet-line" style="display:none;"></div>
</div>

<style>
  #nt-root {
    --bg: #11151a; --panel: #171c23; --line: #2a313b;
    --text: #e7ecf1; --muted: #8b97a5; --accent: #f7f5d7;
    --accent-dim: #4a4a30; --blue: #5ab0ff; --blue-dim: #1c2f42;
    --green: #5fd99a; --red: #ff6b6b;
    --serif: Georgia, 'Times New Roman', Times, serif;
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-family: var(--sans);
    color: var(--text); background: var(--bg);
    border-radius: 12px; padding: 28px; box-sizing: border-box;
    max-width: 900px; margin: 0 auto;
  }
  #nt-root * { box-sizing: border-box; }

  .nt-eyebrow { font-size: 11px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); }
  .nt-masthead-top { display: flex; justify-content: space-between; margin-bottom: 6px; }
  .nt-title { font-family: var(--serif); font-size: 42px; font-weight: 700; letter-spacing: -0.01em; margin: 0; line-height: 1; }
  .nt-rule { border-top: 2px solid var(--text); margin: 12px 0 8px 0; }
  .nt-masthead-bottom { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
  .nt-subtitle { font-size: 12.5px; color: var(--muted); margin: 0; }
  .nt-subtitle.nt-error { color: var(--red); }
  .nt-subtitle.nt-ok { color: var(--green); }
  .nt-fetch-btn, .nt-slack-btn { background: var(--accent); color: #1a1305; border: none; border-radius: 6px; padding: 7px 14px; font-size: 12px; font-weight: 600; cursor: pointer; white-space: nowrap; }
  .nt-fetch-btn:disabled, .nt-slack-btn:disabled { opacity: 0.5; cursor: default; }

  .nt-section-label { font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent); margin-bottom: 10px; }

  .nt-exec { background: var(--accent-dim); border-radius: 10px; padding: 16px 20px; margin-bottom: 20px; }
  .nt-exec ol { margin: 0; padding-left: 20px; }
  .nt-exec li { margin-bottom: 8px; }
  .nt-exec a { font-family: var(--serif); font-size: 16px; color: var(--accent); text-decoration: none; line-height: 1.4; }
  .nt-exec a:hover { text-decoration: underline; }

  .nt-suggestions { background: var(--panel); border: 1px solid var(--line); border-radius: 10px; padding: 16px 20px; margin-bottom: 28px; }
  .nt-suggest-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .nt-suggest-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; }
  .nt-suggest-cat { font-size: 10.5px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--green); margin-bottom: 5px; }
  .nt-suggest-cat.nt-weekend { color: var(--accent); }
  .nt-suggest-item { font-size: 13px; color: var(--text); line-height: 1.55; margin-bottom: 3px; }
  .nt-suggest-link { color: var(--text); text-decoration: none; border-bottom: 1px dotted var(--muted); }
  .nt-suggest-link:hover { color: #D97757; border-bottom-color: #D97757; }
  .nt-suggest-block { margin-bottom: 4px; }

  .nt-region { margin-bottom: 26px; }
  .nt-region-head { display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--line); padding-bottom: 6px; margin-bottom: 12px; }
  .nt-region-label { font-size: 11px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); }
  .nt-region-map { flex-shrink: 0; }
  .nt-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 12px; }

  .nt-country { background: var(--panel); border: 1px solid var(--line); border-radius: 8px; padding: 12px 14px; }
  .nt-country-name { font-size: 11px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
  .nt-story { margin-bottom: 8px; }
  .nt-story:last-child { margin-bottom: 0; }
  .nt-story a { font-family: var(--serif); color: var(--text); text-decoration: none; font-size: 14.5px; line-height: 1.35; display: block; }
  .nt-story a:hover { color: var(--accent); }

  .nt-quiet-line { font-size: 11.5px; color: var(--muted); font-style: italic; margin-bottom: 8px; line-height: 1.6; }
</style>

  function regionMapSvg(activeRegion) {
    const highlight = REGION_PATHS[activeRegion]
      ? `<path d="${REGION_PATHS[activeRegion]}" fill="#D97757" opacity="0.9"/>`
      : '';
    return `<svg class="nt-region-map" width="56" height="95" viewBox="0 0 100 170">
      <path d="${MAINLAND_PATH} ${OTHER_ISLANDS_PATH}" fill="#171c23" stroke="#8a5f4a" stroke-width="1"/>
      ${highlight}
      <path d="${MAINLAND_PATH} ${OTHER_ISLANDS_PATH}" fill="none" stroke="#c98a63" stroke-width="1.4"/>
    </svg>`;
  }

  const REGIONS = [
    ['Mexico, Central America & Caribbean', ['Mexico', 'Guatemala', 'Honduras', 'El Salvador', 'Nicaragua', 'Costa Rica', 'Panama', 'Dominican Republic']],
    ['Andean Region', ['Colombia', 'Ecuador', 'Peru', 'Bolivia', 'Venezuela']],
    ['Southern Cone', ['Argentina', 'Brazil', 'Chile', 'Uruguay', 'Paraguay']],
  ];

  const regionBox = document.getElementById('nt-regions');
  const quietLine = document.getElementById('nt-quiet-line');
  const statusEl = document.getElementById('nt-status');
  const dateEl = document.getElementById('nt-date');
  const fetchBtn = document.getElementById('nt-fetch');
  const execBox = document.getElementById('nt-exec');
  const execList = document.getElementById('nt-exec-list');
  const suggestBox = document.getElementById('nt-suggestions');
  const suggestBody = document.getElementById('nt-suggest-body');
  const slackBtn = document.getElementById('nt-slack-btn');

  let lastBrief = null;

  dateEl.textContent = new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
  }

  function timeAgo(iso) {
    try {
      const diffMs = Date.now() - new Date(iso).getTime();
      const mins = Math.round(diffMs / 60000);
      if (mins < 60) return mins + 'm ago';
      const hrs = Math.round(mins / 60);
      if (hrs < 24) return hrs + 'h ago';
      return Math.round(hrs / 24) + 'd ago';
    } catch (e) { return ''; }
  }

  function renderExec(brief) {
    const items = (brief && brief.executive_summary) || [];
    if (!items.length) { execBox.style.display = 'none'; return; }
    execList.innerHTML = items.map(s => {
      const headline = escapeHtml(s.headline || s);
      const url = s.url ? escapeHtml(s.url) : '#';
      return `<li><a href="${url}" target="_blank" rel="noopener">${headline}</a></li>`;
    }).join('');
    execBox.style.display = 'block';
  }

  function countryCardHtml(country, stories, checked) {
    let html = `<div class="nt-country-head">
      <span class="nt-country-name">${escapeHtml(country)}</span>
      <span class="nt-country-updated">${checked ? 'checked ' + timeAgo(checked) : ''}</span>
    </div>`;
    if (!stories.length) {
      html += `<div class="nt-quiet">No significant coverage today.</div>`;
    } else {
      stories.forEach(s => {
        html += `<div class="nt-story">
          <a href="${escapeHtml(s.url)}" target="_blank" rel="noopener">${escapeHtml(s.headline || s.title)}</a>
        </div>`;
      });
    }
    return html;
  }

  function renderRegions(data, brief) {
    regionBox.innerHTML = '';
    const curated = (brief && brief.country_highlights) || {};
    const lastChecked = data.last_checked || {};
    const quiet = [];

    REGIONS.forEach(([regionName, countries]) => {
      const activeCountries = countries.filter(c => (curated[c] || []).length > 0);
      countries.forEach(c => { if (!(curated[c] || []).length) quiet.push(c); });
      if (!activeCountries.length) return;

      const section = document.createElement('div');
      section.className = 'nt-region';
      let html = `<div class="nt-region-head">${regionMapSvg(regionName)}<div class="nt-region-label">${escapeHtml(regionName)}</div></div><div class="nt-grid">`;
      activeCountries.forEach(country => {
        const stories = curated[country] || [];
        const checked = lastChecked[country];
        html += `<div class="nt-country">${countryCardHtml(country, stories, checked)}</div>`;
      });
      html += `</div>`;
      section.innerHTML = html;
      regionBox.appendChild(section);
    });

    if (quiet.length) {
      quietLine.textContent = 'Also checked today, nothing significant: ' + quiet.join(', ') + '.';
      quietLine.style.display = 'block';
    } else {
      quietLine.style.display = 'none';
    }
  }

  function renderSuggestions(brief) {
    if (!brief) { suggestBox.style.display = 'none'; return; }
    const cb = brief.continental_briefing || {};
    const itemHtml = (i) => {
      if (i && typeof i === 'object' && i.url) {
        return `<a href="${escapeHtml(i.url)}" target="_blank" rel="noopener" class="nt-suggest-link">${escapeHtml(i.text || 'Untitled')}</a>`;
      }
      return escapeHtml((i && i.text) || i);
    };
    const section = (label, items, cls) => {
      if (!items || !items.length) return '';
      return `<div class="nt-suggest-block">
        <div class="nt-suggest-cat ${cls || ''}">${label}</div>
        ${items.map(i => `<div class="nt-suggest-item">${itemHtml(i)}</div>`).join('')}
      </div>`;
    };
    suggestBody.innerHTML = `<div class="nt-suggest-grid">` +
      section('Business & macro', cb.business_macro) +
      section('Climate & energy', cb.climate_energy) +
      section('Geopolitics & politics', cb.geopolitics_politics) +
      section('Tech & deals', cb.tech_deals) +
      section('Political pitches', brief.political_story_suggestions) +
      section('Business/tech pitches', brief.business_tech_story_suggestions) +
      section('Weekend read', brief.weekend_read_suggestion ? [brief.weekend_read_suggestion] : null, 'nt-weekend') +
      `</div>`;
    suggestBox.style.display = 'block';
  }

  async function load() {
    statusEl.textContent = 'Loading latest headlines…';
    statusEl.className = 'nt-subtitle';
    fetchBtn.disabled = true;

    let data = null;
    try {
      const res = await fetch(JSON_URL + '?t=' + Date.now());
      if (!res.ok) throw new Error('HTTP ' + res.status);
      data = await res.json();
      statusEl.textContent = 'Headlines loaded.';
      statusEl.className = 'nt-subtitle nt-ok';
    } catch (err) {
      statusEl.textContent = 'Could not load headlines (' + err.message + ').';
      statusEl.className = 'nt-subtitle nt-error';
    } finally {
      fetchBtn.disabled = false;
    }

    let brief = null;
    try {
      const briefRes = await fetch(BRIEF_URL + '?t=' + Date.now());
      if (briefRes.ok) brief = await briefRes.json();
    } catch (e) { /* brief stays null */ }

    lastBrief = brief;
    renderExec(brief);
    renderSuggestions(brief);
    if (data) renderRegions(data, brief);
  }

  slackBtn.addEventListener('click', async () => {
    if (!lastBrief) return;
    slackBtn.disabled = true;
    slackBtn.textContent = 'Sending…';
    try {
      const res = await fetch(SLACK_PROXY_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ ...lastBrief, region_label: 'LatAm' }),
      });
      slackBtn.textContent = res.ok ? 'Sent' : 'Failed';
    } catch (e) {
      slackBtn.textContent = 'Failed';
    } finally {
      setTimeout(() => { slackBtn.disabled = false; slackBtn.textContent = 'Send to Slack'; }, 2500);
    }
  });

  fetchBtn.addEventListener('click', load);
  load();
})();
</script>
</body>
</html>
